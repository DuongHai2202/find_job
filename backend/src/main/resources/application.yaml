spring:
  application:
    name: jobportal
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB        # gioi han upload CV/anh
      max-request-size: 10MB
  jpa:
    open-in-view: false          # tat OSIV (chuan data-access)
    hibernate:
      ddl-auto: none             # Flyway la nguon chan ly duy nhat cho schema
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true              # bat ProblemDetail (RFC 7807) cho loi API
server:
  port: ${PORT:8080}

# Cau hinh ung dung (anh xa qua @ConfigurationProperties)
app:
  jwt:
    secret: ${JWT_SECRET:change-me-this-is-a-very-long-dev-secret-key-at-least-256-bits-1234567890}
    issuer: ${JWT_ISSUER:jobportal-api}
    audience: ${JWT_AUDIENCE:jobportal-web}
    expiration-ms: 86400000      # 24h
  cors:
    allowed-origins:
      - ${CORS_ORIGINS:http://localhost:5173}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    provider: ${UPLOAD_PROVIDER:LOCAL}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_FOLDER:jobportal/resumes}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    frontend-success-url: ${GOOGLE_FRONTEND_SUCCESS_URL:http://localhost:5173/auth/callback}
    frontend-failure-url: ${GOOGLE_FRONTEND_FAILURE_URL:http://localhost:5173/login}
  admin-bootstrap:
    enabled: ${APP_BOOTSTRAP_ADMIN:false}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
    full-name: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:Admin JobPortal}
  seed: false

# Actuator: health check cho deploy
management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    disable-swagger-default-url: true
