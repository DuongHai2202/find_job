# Profile PROD: MySQL that. Moi gia tri nhay cam doc tu bien moi truong.
# Schema do Flyway quan ly (V1, V2...). Hibernate chi anh xa, khong tu sua bang.
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jobportal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  seed: ${APP_SEED:false}   # mac dinh KHONG seed o production
