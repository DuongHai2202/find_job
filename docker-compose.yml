services:
  mysql:
    image: mysql:8.4
    container_name: findjob-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: job_portal
      MYSQL_USER: jobportal
      MYSQL_PASSWORD: jobportal
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: findjob-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/job_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: jobportal
      DB_PASSWORD: jobportal
      JWT_SECRET: change-me-this-is-a-very-long-docker-secret-key-1234567890
      JWT_ISSUER: jobportal-api
      JWT_AUDIENCE: jobportal-web
      CORS_ORIGINS: http://localhost:5173
      APP_SEED: "true"
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_FRONTEND_SUCCESS_URL: http://localhost:5173/auth/callback
      GOOGLE_FRONTEND_FAILURE_URL: http://localhost:5173/login
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    container_name: findjob-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
